apiVersion: apps/v1
kind: Deployment
metadata:
  name: ares-backend
  labels:
    app: ares-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ares-backend
  template:
    metadata:
      labels:
        app: ares-backend
    spec:
      containers:
      - name: ares-backend
        image: docker.io/akritidey07/ares-backend:latest
        ports:
        - containerPort: 8000